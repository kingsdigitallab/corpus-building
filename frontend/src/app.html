<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="https://fav.farm/🪨" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        %sveltekit.head%
        <script>
            // Unovis 6-color limitation workaround
            globalThis.UNOVIS_COLORS = Array.from({ length: 12 }, (_, i) => `var(--vis-color${i})`);
            globalThis.UNOVIS_COLORS_DARK = Array.from({ length: 12 }, (_, i) => `var(--vis-dark-color${i})`);
        </script>
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
